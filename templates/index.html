<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
     content="width=device-width, initial-scale=1.0">
    <title>To-doList</title>    
    <link rel="stylesheet" href="../static/style.css">
</head>


<body>
    <h1>-- Lista de Tareas --</h1>

    <form method="POST" action="/agregar">

        <input type="text" placeholder="Escribe una nueva tarea..." name="descripcion" required>
        <button type="submit">Agregar</button>

    </form>
    <ul>
    {% for tarea in tareas %}
    <li class="tarea-item {{ tarea.estado }}">
        <span>{{ tarea.datos }}</span>
        <div class="botones">
            
            
            <form method="POST" action="/completar">
                <input type="hidden" name="descripcion" value="{{ tarea.datos }}">
                <button type="submit">Completar</button>
            </form>
                 
            <form method="POST" action="/eliminar">
                <input type="hidden" name="descripcion" value="{{ tarea.datos }}">
                <button type="submit">Eliminar</button>
            </form>

                    
        </div>
    </li>
    {% endfor %}
    </ul>

</body>



</html>
